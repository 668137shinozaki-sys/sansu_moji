<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MNIST 高精度版 手書き数字認識</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.17.0/tf.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f5f7fb;
  text-align:center;
  padding:20px;
}
h1{font-size:28px;margin-bottom:8px;}
.wrap{
  max-width:700px;
  margin:auto;
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}
canvas{
  border:3px solid #ddd;
  border-radius:14px;
  background:#111;
  width:100%;
  max-width:520px;
  height:220px;
  touch-action:none;
}
button{
  padding:12px 22px;
  font-size:18px;
  border:none;
  border-radius:12px;
  margin:8px;
  cursor:pointer;
}
.main{background:#ff7043;color:white;}
.sub{background:#eee;}
#result{
  margin-top:20px;
  font-size:36px;
  font-weight:bold;
}
#status{
  margin-top:10px;
  color:#666;
}
#debug canvas{
  width:84px;
  height:84px;
  border:2px solid #ddd;
  image-rendering:pixelated;
  margin-top:15px;
}
.bar{
  display:flex;
  justify-content:center;
  gap:4px;
  align-items:flex-end;
  height:90px;
  margin-top:15px;
}
.col{
  width:28px;
}
.fill{
  background:#ff7043;
  border-radius:5px 5px 0 0;
}
.lab{
  font-size:12px;
}
</style>
</head>
<body>

<div class="wrap">
<h1>✏️ 高精度 手書き数字認識</h1>

<canvas id="cv" width="520" height="220"></canvas>

<div>
<button class="sub" onclick="clearCanvas()">消す</button>
<button class="main" onclick="predict()">認識する</button>
</div>

<div id="status">モデル読み込み中...</div>
<div id="result">?</div>
<div id="debug"></div>
<div id="chart"></div>
</div>

<script>
let model=null;

const canvas=document.getElementById("cv");
const ctx=canvas.getContext("2d");

const W=520,H=220;

function initCanvas(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,W,H);
}
initCanvas();

//////////////////////////////////////////////////////
// モデル読み込み
//////////////////////////////////////////////////////
async function loadModel(){
  try{
    model=await tf.loadLayersModel(
      "https://raw.githubusercontent.com/aaroncherian/tfjs_mnist/main/model/model.json"
    );
    status("モデル読込完了");
  }catch(e){
    status("モデル読み込み失敗");
    console.error(e);
  }
}
loadModel();

function status(t){
  document.getElementById("status").textContent=t;
}

//////////////////////////////////////////////////////
// 描画
//////////////////////////////////////////////////////
let drawing=false,lastX=0,lastY=0;

function pos(e){
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX||e.touches[0].clientX)-r.left;
  const y=(e.clientY||e.touches[0].clientY)-r.top;
  return {
    x:x*W/r.width,
    y:y*H/r.height
  };
}

canvas.onmousedown=e=>{
  drawing=true;
  const p=pos(e);
  lastX=p.x;lastY=p.y;
};
canvas.onmousemove=e=>{
  if(!drawing)return;
  draw(e);
};
canvas.onmouseup=()=>drawing=false;
canvas.onmouseleave=()=>drawing=false;

canvas.ontouchstart=e=>{
  e.preventDefault();
  drawing=true;
  const p=pos(e);
  lastX=p.x;lastY=p.y;
};
canvas.ontouchmove=e=>{
  e.preventDefault();
  if(!drawing)return;
  draw(e);
};
canvas.ontouchend=()=>drawing=false;

function draw(e){
  const p=pos(e);

  ctx.strokeStyle="white";
  ctx.lineWidth=10;              // ←改善① 太すぎ修正
  ctx.lineCap="round";
  ctx.lineJoin="round";

  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();

  lastX=p.x;
  lastY=p.y;
}

function clearCanvas(){
  initCanvas();
  document.getElementById("result").textContent="?";
  document.getElementById("debug").innerHTML="";
  document.getElementById("chart").innerHTML="";
}

//////////////////////////////////////////////////////
// 高精度 前処理
//////////////////////////////////////////////////////
function preprocess(){

  const img=ctx.getImageData(0,0,W,H);

  let minX=W,minY=H,maxX=0,maxY=0;

  for(let y=0;y<H;y++){
    for(let x=0;x<W;x++){
      const i=(y*W+x)*4;
      const r=img.data[i];
      if(r>40){
        if(x<minX)minX=x;
        if(x>maxX)maxX=x;
        if(y<minY)minY=y;
        if(y>maxY)maxY=y;
      }
    }
  }

  if(maxX<=minX)return null;

  // 余白
  minX=Math.max(0,minX-8);
  minY=Math.max(0,minY-8);
  maxX=Math.min(W-1,maxX+8);
  maxY=Math.min(H-1,maxY+8);

  const bw=maxX-minX;
  const bh=maxY-minY;
  const size=Math.max(bw,bh);

  // 20x20に収める
  const tmp=document.createElement("canvas");
  tmp.width=20;
  tmp.height=20;
  const t=tmp.getContext("2d");
  t.imageSmoothingEnabled=false;      // ←改善②

  t.fillStyle="black";
  t.fillRect(0,0,20,20);

  const dx=(20-bw*20/size)/2;
  const dy=(20-bh*20/size)/2;

  t.drawImage(canvas,
    minX,minY,bw,bh,
    dx,dy,
    bw*20/size,
    bh*20/size
  );

  // 28x28化
  const out=document.createElement("canvas");
  out.width=28;
  out.height=28;
  const o=out.getContext("2d");
  o.imageSmoothingEnabled=false;      // ←改善②

  o.fillStyle="black";
  o.fillRect(0,0,28,28);
  o.drawImage(tmp,4,4);

  // 改善③ 重心補正
  centerByMass(out);

  return out;
}

//////////////////////////////////////////////////////
// 重心中央寄せ（超重要）
//////////////////////////////////////////////////////
function centerByMass(c){
  const g=c.getContext("2d");
  const img=g.getImageData(0,0,28,28);

  let sum=0,mx=0,my=0;

  for(let y=0;y<28;y++){
    for(let x=0;x<28;x++){
      const i=(y*28+x)*4;
      const v=img.data[i]/255;
      sum+=v;
      mx+=x*v;
      my+=y*v;
    }
  }

  if(sum===0)return;

  mx/=sum;
  my/=sum;

  const shiftX=Math.round(14-mx);
  const shiftY=Math.round(14-my);

  const copy=document.createElement("canvas");
  copy.width=28;
  copy.height=28;
  copy.getContext("2d").drawImage(c,0,0);

  g.fillStyle="black";
  g.fillRect(0,0,28,28);
  g.drawImage(copy,shiftX,shiftY);
}

//////////////////////////////////////////////////////
// 認識
//////////////////////////////////////////////////////
async function predict(){

  if(!model)return;

  status("認識中...");

  const thumb=preprocess();

  if(!thumb){
    status("数字がありません");
    return;
  }

  document.getElementById("debug").innerHTML="";
  document.getElementById("debug").appendChild(thumb);

  const tensor=tf.tidy(()=>{
    let t=tf.browser.fromPixels(thumb,1)
      .toFloat()
      .div(255);

    // 改善④ 二値化
    t=t.greater(0.25).toFloat();

    return t.reshape([1,28,28,1]);
  });

  const pred=await model.predict(tensor).data();
  tensor.dispose();

  const arr=Array.from(pred);
  const best=arr.indexOf(Math.max(...arr));
  const conf=(Math.max(...arr)*100).toFixed(1);

  document.getElementById("result").textContent=
    best+"  ("+conf+"%)";

  drawChart(arr);

  status("認識完了");
}

//////////////////////////////////////////////////////
// 棒グラフ
//////////////////////////////////////////////////////
function drawChart(arr){

  let html='<div class="bar">';

  arr.forEach((v,i)=>{
    html+=`
    <div class="col">
      <div class="fill" style="height:${Math.max(4,v*80)}px"></div>
      <div class="lab">${i}</div>
    </div>`;
  });

  html+='</div>';

  document.getElementById("chart").innerHTML=html;
}
</script>
</body>
</html>
